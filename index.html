<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>全球市场日报 H5</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(18, 25, 48, 0.88);
      --card2: rgba(27, 36, 68, 0.95);
      --text: #eef2ff;
      --muted: #a7b0d6;
      --line: rgba(255,255,255,0.1);
      --green: #32d296;
      --blue: #72a8ff;
      --yellow: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(114,168,255,.22), transparent 28%),
        radial-gradient(circle at top left, rgba(50,210,150,.18), transparent 25%),
        linear-gradient(180deg, #0b1020 0%, #101933 100%);
      min-height: 100vh;
      padding: 18px 14px 32px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
    }
    .hero {
      background: linear-gradient(135deg, rgba(114,168,255,.20), rgba(50,210,150,.10));
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #d7e2ff;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 { font-size: 30px; margin: 0 0 10px; }
    h2 { font-size: 20px; margin: 0 0 12px; }
    p { line-height: 1.72; color: #e7ebff; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 14px; }
    .metric {
      background: rgba(14, 20, 39, 0.7);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .metric .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .metric .value { font-size: 22px; font-weight: 700; }
    .section { margin-top: 14px; }
    .list { display: grid; gap: 10px; }
    a.item {
      display: block;
      text-decoration: none;
      color: var(--text);
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
    }
    a.item:hover { background: rgba(255,255,255,0.07); }
    .date { font-size: 15px; font-weight: 700; }
    .desc { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      display: inline-block; text-decoration: none; color: #08111f; background: var(--yellow);
      font-weight: 700; padding: 10px 14px; border-radius: 999px;
    }
    .btn.secondary { background: var(--blue); color: white; }
    .footer { margin-top: 16px; color: var(--muted); font-size: 12px; text-align: center; }
    @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 26px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="tag">GitHub Pages · 连续日报 · 可回看</div>
      <h1>全球市场日报 H5</h1>
      <p>这里会持续归档每日市场分析，覆盖：<strong>中概、恒生科技、纳斯达克、标普500、红利、日经、德国</strong>。每篇日报都优先基于<strong>前一日最新收盘数据</strong>生成。</p>
      <div class="grid">
        <div class="metric"><div class="label">更新频率</div><div class="value">每天 09:00</div></div>
        <div class="metric"><div class="label">阅读形式</div><div class="value">单文件 H5</div></div>
        <div class="metric"><div class="label">访问方式</div><div class="value">网页直开</div></div>
        <div class="metric"><div class="label">历史归档</div><div class="value">支持回看</div></div>
      </div>
      <div class="btns">
        <a class="btn" id="latest-link" href="./reports/2026-03-28/">打开最新日报</a>
        <a class="btn secondary" href="https://github.com/jinkaiqie-rgb/hstech-analysis-h5" target="_blank" rel="noopener">查看仓库</a>
      </div>
    </section>

    <section class="section card">
      <h2>日报归档</h2>
      <p class="muted">最新在上。你可以像看博客一样回看之前每一天的分析。</p>
      <div id="report-list" class="list"></div>
    </section>

    <div class="footer">说明：内容仅作市场分析交流，不构成个性化投资建议。</div>
  </div>

  <script>
    const fallback = [
      { date: '2026-03-28', title: '恒生科技走势分析（首篇示例）', path: './reports/2026-03-28/' }
    ];

    function render(items) {
      const list = document.getElementById('report-list');
      if (!items || !items.length) items = fallback;
      list.innerHTML = items.map(item => `
        <a class="item" href="${item.path}">
          <div class="date">${item.date} · ${item.title || '市场日报'}</div>
          <div class="desc">${item.summary || '点击查看当天 H5 报告'}</div>
        </a>
      `).join('');
      const latest = items[0];
      if (latest) {
        const link = document.getElementById('latest-link');
        link.href = latest.path;
        link.textContent = `打开最新日报（${latest.date}）`;
      }
    }

    fetch('./reports/index.json?_=' + Date.now())
      .then(r => r.ok ? r.json() : Promise.reject(new Error('no index')))
      .then(data => render(data.reports || data))
      .catch(() => render(fallback));
  </script>
</body>
</html>
